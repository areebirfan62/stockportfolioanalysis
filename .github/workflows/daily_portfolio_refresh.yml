name: Daily Portfolio Refresh

on:
  schedule:
    # GitHub cron is UTC. During daylight saving time, 19:45 UTC = 3:45 PM ET.
    # If you need exact 3:45 PM ET during winter, change this to 20:45 UTC after DST ends.
    - cron: "45 19 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-portfolio-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbconvert ipykernel

      - name: Execute portfolio notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute notebooks/BDM_final_portfolio_notebook.ipynb \
            --output BDM_final_portfolio_notebook_executed.ipynb \
            --output-dir notebooks \
            --ExecutePreprocessor.timeout=3600 \
            --ExecutePreprocessor.kernel_name=python3

      - name: Collect notebook outputs
        run: python scripts/collect_outputs.py

      - name: Validate portfolio constraints
        run: python scripts/validate_outputs.py

      - name: Render latest summary
        run: python scripts/render_latest_summary.py

      - name: Build interactive dashboard
        run: python scripts/build_dashboard.py

      - name: Commit refreshed portfolio outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add README.md data docs reports notebooks/BDM_final_portfolio_notebook_executed.ipynb
          if git diff --cached --quiet; then
            echo "No portfolio output changes to commit."
          else
            git commit -m "Daily portfolio refresh"
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push was rejected. Rebasing on latest main and retrying, attempt ${attempt}."
              git fetch origin main
              git rebase origin/main
            done
            echo "Push failed after 3 attempts."
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4
